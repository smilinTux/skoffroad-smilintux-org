<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="skoffroad mascot — smilinTux the penguin driving a tricked-out Skrambler, front view">
  <!-- skoffroad — S&K OFFROAD mascot.
       Pure front view: jeep faces the camera, smilinTux grinning at the
       viewer through the windshield. All the tricked-out features are
       on the front face so they read cleanly without perspective fighting.
       Palette matches the marketing CSS:
         dirt-900 #0c0a09, mud-500 #d97706, mud-300 #fbbf24, bone #fafaf9, steel #a8a29e. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1411"/>
      <stop offset="100%" stop-color="#2b1d10"/>
    </linearGradient>
    <linearGradient id="bodyFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="hoodTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="tire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a3530"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="pengbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <radialGradient id="dust" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a8a29e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a8a29e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hlGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="480" height="360" fill="url(#sky)"/>

  <!-- Distant mountain ridge -->
  <path d="M0 256 L70 238 L130 250 L200 230 L270 246 L340 230 L400 246 L480 236 L480 360 L0 360 Z"
        fill="#1a1310"/>

  <!-- Ground shadow under the jeep -->
  <ellipse cx="240" cy="328" rx="178" ry="14" fill="#0c0a09" opacity="0.85"/>

  <!-- Dust kicked up around the tires (atmosphere, both sides) -->
  <circle cx="58"  cy="298" r="34" fill="url(#dust)"/>
  <circle cx="100" cy="288" r="28" fill="url(#dust)"/>
  <circle cx="380" cy="288" r="28" fill="url(#dust)"/>
  <circle cx="422" cy="298" r="34" fill="url(#dust)"/>

  <!-- ==================== ROLL CAGE (FRONT VIEW) ====================
       Two A-pillars + top crossbar. Symmetric. Sits behind everything. -->
  <g stroke="#0c0a09" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="138" y1="140" x2="138" y2="208"/>
    <line x1="342" y1="140" x2="342" y2="208"/>
    <line x1="138" y1="140" x2="342" y2="140"/>
  </g>

  <!-- LIGHT BAR across the cage top with bright LEDs -->
  <g>
    <circle cx="240" cy="123" r="50" fill="url(#lbGlow)"/>
    <rect x="148" y="118" width="184" height="14" rx="4" fill="#1f1814" stroke="#0c0a09" stroke-width="1.5"/>
    <g fill="#fef3c7">
      <circle cx="166" cy="125" r="4"/>
      <circle cx="192" cy="125" r="4"/>
      <circle cx="216" cy="125" r="4"/>
      <circle cx="240" cy="125" r="4"/>
      <circle cx="264" cy="125" r="4"/>
      <circle cx="288" cy="125" r="4"/>
      <circle cx="314" cy="125" r="4"/>
    </g>
    <g fill="#fbbf24" opacity="0.3">
      <circle cx="166" cy="125" r="10"/>
      <circle cx="192" cy="125" r="10"/>
      <circle cx="216" cy="125" r="10"/>
      <circle cx="240" cy="125" r="10"/>
      <circle cx="264" cy="125" r="10"/>
      <circle cx="288" cy="125" r="10"/>
      <circle cx="314" cy="125" r="10"/>
    </g>
  </g>

  <!-- ==================== WHEELS — FRONT VIEW ====================
       Drawn BEFORE the body so the bumper renders on top of the tires
       (matches reality — the bumper sits in front of the wheels and
       visually obscures their upper portion).
       From dead-on front you see the TREAD pattern, not the sidewall.
       Each tire is a tall rounded-rectangle with chunky offset mud-terrain
       tread blocks. -->

  <!-- Passenger side (image-left) — 37" mud tire, front face -->
  <rect x="100" y="246" width="64" height="88" rx="16" fill="#1f1814" stroke="#0c0a09" stroke-width="2"/>
  <rect x="103" y="249" width="58" height="82" rx="14" fill="url(#tire)"/>
  <g fill="#3a3530">
    <rect x="111" y="256" width="42" height="9" rx="2"/>
    <rect x="106" y="270" width="22" height="9" rx="2"/>
    <rect x="138" y="270" width="22" height="9" rx="2"/>
    <rect x="111" y="284" width="42" height="9" rx="2"/>
    <rect x="106" y="298" width="22" height="9" rx="2"/>
    <rect x="138" y="298" width="22" height="9" rx="2"/>
    <rect x="111" y="312" width="42" height="9" rx="2"/>
  </g>
  <g fill="#1f1814">
    <rect x="100" y="262" width="4" height="6"/>
    <rect x="100" y="278" width="4" height="6"/>
    <rect x="100" y="294" width="4" height="6"/>
    <rect x="100" y="310" width="4" height="6"/>
    <rect x="160" y="262" width="4" height="6"/>
    <rect x="160" y="278" width="4" height="6"/>
    <rect x="160" y="294" width="4" height="6"/>
    <rect x="160" y="310" width="4" height="6"/>
  </g>

  <!-- Driver side (image-right) — 37" mud tire, front face -->
  <rect x="316" y="246" width="64" height="88" rx="16" fill="#1f1814" stroke="#0c0a09" stroke-width="2"/>
  <rect x="319" y="249" width="58" height="82" rx="14" fill="url(#tire)"/>
  <g fill="#3a3530">
    <rect x="327" y="256" width="42" height="9" rx="2"/>
    <rect x="322" y="270" width="22" height="9" rx="2"/>
    <rect x="354" y="270" width="22" height="9" rx="2"/>
    <rect x="327" y="284" width="42" height="9" rx="2"/>
    <rect x="322" y="298" width="22" height="9" rx="2"/>
    <rect x="354" y="298" width="22" height="9" rx="2"/>
    <rect x="327" y="312" width="42" height="9" rx="2"/>
  </g>
  <g fill="#1f1814">
    <rect x="316" y="262" width="4" height="6"/>
    <rect x="316" y="278" width="4" height="6"/>
    <rect x="316" y="294" width="4" height="6"/>
    <rect x="316" y="310" width="4" height="6"/>
    <rect x="376" y="262" width="4" height="6"/>
    <rect x="376" y="278" width="4" height="6"/>
    <rect x="376" y="294" width="4" height="6"/>
    <rect x="376" y="310" width="4" height="6"/>
  </g>

  <!-- ==================== JEEP BODY (FRONT VIEW) ====================
       Single clean silhouette. Hood at top, main front panel below,
       bumper at the bottom. Bumper renders ON TOP of the tires above. -->

  <!-- Hood (top, lit, slight perspective slope) -->
  <path d="M 145 206 L 335 206 L 330 224 L 150 224 Z"
        fill="url(#hoodTop)" stroke="#1f1814" stroke-width="2"/>
  <!-- Hood vents -->
  <line x1="178" y1="215" x2="302" y2="215" stroke="#92400e" stroke-width="1.5" opacity="0.6"/>

  <!-- FRONT FACE (main body panel, square jeep face) -->
  <rect x="150" y="224" width="180" height="50" fill="url(#bodyFront)" stroke="#1f1814" stroke-width="2.5"/>

  <!-- Headlight glows -->
  <circle cx="172" cy="244" r="22" fill="url(#hlGlow)"/>
  <circle cx="308" cy="244" r="22" fill="url(#hlGlow)"/>

  <!-- Round headlights -->
  <circle cx="172" cy="244" r="11" fill="#fef3c7" stroke="#1f1814" stroke-width="2.5"/>
  <circle cx="172" cy="244" r="5"  fill="#fff"/>
  <circle cx="308" cy="244" r="11" fill="#fef3c7" stroke="#1f1814" stroke-width="2.5"/>
  <circle cx="308" cy="244" r="5"  fill="#fff"/>

  <!-- 7-SLOT GRILLE (center of front face) -->
  <rect x="198" y="234" width="84" height="34" rx="2.5" fill="#1f1814"/>
  <g stroke="#7a6a52" stroke-width="2.8">
    <line x1="206" y1="236" x2="206" y2="266"/>
    <line x1="217" y1="236" x2="217" y2="266"/>
    <line x1="228" y1="236" x2="228" y2="266"/>
    <line x1="240" y1="236" x2="240" y2="266"/>
    <line x1="252" y1="236" x2="252" y2="266"/>
    <line x1="263" y1="236" x2="263" y2="266"/>
    <line x1="274" y1="236" x2="274" y2="266"/>
  </g>

  <!-- SK BADGE above the grille -->
  <rect x="216" y="225" width="48" height="10" rx="2.5" fill="#fbbf24" stroke="#92400e" stroke-width="1"/>
  <text x="240" y="233" font-family="Impact, Arial Black, sans-serif" font-size="10" fill="#0c0a09" text-anchor="middle" font-weight="900">SK</text>

  <!-- FRONT BUMPER (steel, full width, sits at the bottom) -->
  <rect x="118" y="270" width="244" height="22" rx="3" fill="#3a3530" stroke="#0c0a09" stroke-width="2"/>
  <!-- Bumper end caps -->
  <rect x="118" y="270" width="16" height="22" rx="3" fill="#2a2520"/>
  <rect x="346" y="270" width="16" height="22" rx="3" fill="#2a2520"/>

  <!-- WINCH housing centered on the bumper -->
  <rect x="200" y="266" width="80" height="14" rx="2" fill="#5a5450" stroke="#0c0a09" stroke-width="1.5"/>
  <!-- Drum end caps (dark with chrome ring) -->
  <circle cx="210" cy="273" r="7" fill="#1f1814" stroke="#a8a29e" stroke-width="1.5"/>
  <circle cx="270" cy="273" r="7" fill="#1f1814" stroke="#a8a29e" stroke-width="1.5"/>
  <!-- Fairlead -->
  <rect x="232" y="278" width="16" height="6" rx="1" fill="#a8a29e" stroke="#0c0a09" stroke-width="1"/>

  <!-- Two YELLOW D-rings on the bumper -->
  <circle cx="150" cy="282" r="6" fill="#fbbf24" stroke="#0c0a09" stroke-width="1.5"/>
  <circle cx="330" cy="282" r="6" fill="#fbbf24" stroke="#0c0a09" stroke-width="1.5"/>

  <!-- WINCH CABLE — sags from fairlead exit, curves right to right D-ring -->
  <path d="M 240 284 Q 285 296 330 282" fill="none" stroke="#7a6a52" stroke-width="2.6" stroke-linecap="round"/>
  <!-- J-hook clipped to the right D-ring -->
  <path d="M 330 282 L 330 294 Q 330 298 324 298" fill="none" stroke="#1f1814" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="330" cy="282" r="2" fill="#1f1814"/>

  <!-- Mud splatter on the lower body -->
  <g fill="#4a3014" opacity="0.6">
    <circle cx="160" cy="264" r="3"/>
    <circle cx="180" cy="268" r="2"/>
    <circle cx="295" cy="266" r="3"/>
    <circle cx="318" cy="262" r="2.5"/>
    <circle cx="200" cy="270" r="2"/>
    <circle cx="270" cy="270" r="2.5"/>
  </g>

  <!-- ==================== WINDSHIELD ====================
       Trapezoidal glass behind the cage, in front of the cab. -->
  <path d="M 154 144 L 326 144 L 335 206 L 145 206 Z"
        fill="#0c0a09" opacity="0.55" stroke="#1f1814" stroke-width="1.8"/>
  <!-- Reflection sheen -->
  <path d="M 170 150 L 230 150 L 222 192 L 175 192 Z"
        fill="#fafaf9" opacity="0.06"/>

  <!-- ==================== smilinTUX ====================
       Sits inside the cab, centred behind the windshield. -->

  <!-- Body (upper torso visible behind dashboard) -->
  <ellipse cx="240" cy="208" rx="34" ry="24" fill="url(#pengbody)"/>
  <!-- White belly -->
  <ellipse cx="240" cy="214" rx="24" ry="18" fill="#fafaf9"/>

  <!-- Head -->
  <ellipse cx="240" cy="170" rx="28" ry="24" fill="url(#pengbody)"/>
  <!-- White face mask -->
  <ellipse cx="240" cy="178" rx="20" ry="16" fill="#fafaf9"/>

  <!-- Goggles strap (band across forehead) -->
  <rect x="212" y="158" width="56" height="8" rx="2" fill="#1f1814"/>
  <!-- Yellow goggle lenses -->
  <ellipse cx="227" cy="163" rx="8" ry="6.5" fill="#fbbf24" stroke="#1f1814" stroke-width="2"/>
  <ellipse cx="253" cy="163" rx="8" ry="6.5" fill="#fbbf24" stroke="#1f1814" stroke-width="2"/>
  <!-- Goggle highlights -->
  <ellipse cx="225" cy="161" rx="2.5" ry="1.8" fill="#fff" opacity="0.85"/>
  <ellipse cx="251" cy="161" rx="2.5" ry="1.8" fill="#fff" opacity="0.85"/>

  <!-- Orange beak -->
  <path d="M 233 180 L 247 180 L 240 190 Z" fill="#d97706" stroke="#92400e" stroke-width="1.3"/>

  <!-- BIG happy smile -->
  <path d="M 225 190 Q 240 202 255 190" fill="none" stroke="#1f1814" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="221" cy="188" rx="4" ry="2.2" fill="#d97706" opacity="0.55"/>
  <ellipse cx="259" cy="188" rx="4" ry="2.2" fill="#d97706" opacity="0.55"/>

  <!-- Flippers gripping the steering wheel -->
  <ellipse cx="217" cy="212" rx="9" ry="14" fill="url(#pengbody)" transform="rotate(-28 217 212)"/>
  <ellipse cx="263" cy="212" rx="9" ry="14" fill="url(#pengbody)" transform="rotate(28 263 212)"/>

  <!-- Steering wheel (small, in front of penguin's belly) -->
  <circle cx="240" cy="228" r="11" fill="none" stroke="#0c0a09" stroke-width="3.5"/>
  <line x1="229" y1="228" x2="251" y2="228" stroke="#0c0a09" stroke-width="2.5"/>
  <line x1="240" y1="217" x2="240" y2="239" stroke="#0c0a09" stroke-width="2.5"/>
  <circle cx="240" cy="228" r="2.5" fill="#0c0a09"/>

  <!-- Skid marks behind the rig -->
  <path d="M 40 332 Q 140 326 240 332 T 440 330" fill="none" stroke="#1f1814" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <path d="M 40 342 Q 140 336 240 342 T 440 340" fill="none" stroke="#1f1814" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
</svg>
