<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="skoffroad mascot — smilinTux the penguin driving a tricked-out Skrambler angled toward the viewer">
  <!-- skoffroad — S&K OFFROAD mascot. Front-3/4 view: jeep angled so the
       grille, winch, and driver's side are all visible, with smilinTux
       grinning at the camera from the driver's seat. Palette matches the
       marketing CSS:
         dirt-900 #0c0a09, mud-500 #d97706, mud-300 #fbbf24, bone #fafaf9, steel #a8a29e. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1411"/>
      <stop offset="100%" stop-color="#2b1d10"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="bodyShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#b45309"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="hoodTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="tire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a3530"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="pengbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a3530"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <radialGradient id="dust" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a8a29e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a8a29e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="headlightGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background — warm dirt sky -->
  <rect x="0" y="0" width="480" height="360" fill="url(#sky)"/>

  <!-- Distant ridge silhouette -->
  <path d="M0 240 L60 220 L110 235 L170 215 L240 232 L310 218 L380 234 L440 222 L480 230 L480 360 L0 360 Z"
        fill="#1a1310"/>

  <!-- Foreground ground shadow -->
  <ellipse cx="240" cy="328" rx="240" ry="22" fill="#0c0a09" opacity="0.85"/>

  <!-- Dust cloud behind the jeep (further/back-left) -->
  <circle cx="100" cy="290" r="46" fill="url(#dust)"/>
  <circle cx="60"  cy="300" r="34" fill="url(#dust)"/>
  <circle cx="140" cy="280" r="30" fill="url(#dust)"/>

  <!-- =====================================================================
       JEEP — FRONT-3/4 VIEW.
       The jeep is angled toward the viewer so the FRONT face (grille +
       winch + headlights) sits center-bottom, and the DRIVER SIDE recedes
       to the upper-right. Two front wheels are big and close; two rear
       wheels are smaller and further. The driver's seat reads as
       slightly left-of-center.
       ===================================================================== -->

  <!-- Headlight glow (behind everything else) -->
  <circle cx="160" cy="225" r="32" fill="url(#headlightGlow)"/>
  <circle cx="280" cy="225" r="32" fill="url(#headlightGlow)"/>

  <!-- Rear wheel (driver side, partially occluded, smaller due to perspective) -->
  <ellipse cx="395" cy="265" rx="30" ry="30" fill="#0c0a09"/>
  <circle  cx="395" cy="265" r="26" fill="url(#tire)"/>
  <g fill="#0c0a09" opacity="0.85">
    <g transform="translate(395 265)">
      <rect x="-2.5" y="-26" width="5" height="8" transform="rotate(0)"/>
      <rect x="-2.5" y="-26" width="5" height="8" transform="rotate(60)"/>
      <rect x="-2.5" y="-26" width="5" height="8" transform="rotate(120)"/>
      <rect x="-2.5" y="-26" width="5" height="8" transform="rotate(180)"/>
      <rect x="-2.5" y="-26" width="5" height="8" transform="rotate(240)"/>
      <rect x="-2.5" y="-26" width="5" height="8" transform="rotate(300)"/>
    </g>
  </g>
  <circle cx="395" cy="265" r="10" fill="#a8a29e"/>
  <circle cx="395" cy="265" r="6"  fill="#3a3530"/>
  <!-- Lug bolts (5) on the visible rear wheel face -->
  <g fill="#cbcbcb">
    <circle cx="395" cy="257" r="1.5"/>
    <circle cx="402" cy="262" r="1.5"/>
    <circle cx="399" cy="270" r="1.5"/>
    <circle cx="391" cy="270" r="1.5"/>
    <circle cx="388" cy="262" r="1.5"/>
  </g>

  <!-- ============ JEEP BODY ============ -->

  <!-- Driver side panel (recedes to upper-right) -->
  <path d="M 250 215 L 410 195 L 410 245 L 250 268 Z"
        fill="url(#bodyShade)" stroke="#1f1814" stroke-width="2"/>
  <!-- Side window cutout -->
  <path d="M 268 180 L 395 165 L 395 200 L 268 215 Z"
        fill="#0c0a09" opacity="0.8"/>
  <!-- B-pillar -->
  <rect x="324" y="170" width="6" height="50" fill="#1f1814"/>

  <!-- Front face — the grille + bumper area, facing viewer slightly angled -->
  <!-- Hood (top of front, lit) -->
  <path d="M 130 195 L 290 195 L 280 215 L 140 215 Z"
        fill="url(#hoodTop)" stroke="#1f1814" stroke-width="2"/>
  <!-- Hood vent line -->
  <line x1="160" y1="202" x2="260" y2="202" stroke="#92400e" stroke-width="1.5" opacity="0.7"/>

  <!-- Front face main panel -->
  <path d="M 130 215 L 290 215 L 295 270 L 125 270 Z"
        fill="url(#body)" stroke="#1f1814" stroke-width="2.5"/>

  <!-- Grille (vertical slats in front face center) -->
  <rect x="185" y="225" width="50" height="30" rx="2" fill="#1f1814"/>
  <g stroke="#5a5450" stroke-width="2">
    <line x1="192" y1="227" x2="192" y2="253"/>
    <line x1="200" y1="227" x2="200" y2="253"/>
    <line x1="208" y1="227" x2="208" y2="253"/>
    <line x1="216" y1="227" x2="216" y2="253"/>
    <line x1="224" y1="227" x2="224" y2="253"/>
  </g>

  <!-- SK badge above grille -->
  <rect x="195" y="218" width="30" height="6" rx="1.5" fill="#fbbf24"/>
  <text x="210" y="223" font-family="Impact, sans-serif" font-size="6" fill="#0c0a09" text-anchor="middle" font-weight="900">SK</text>

  <!-- Headlights (round, two on the front face) -->
  <circle cx="160" cy="225" r="11" fill="#fef3c7" stroke="#1f1814" stroke-width="2.5"/>
  <circle cx="160" cy="225" r="5"  fill="#fff"/>
  <circle cx="280" cy="225" r="11" fill="#fef3c7" stroke="#1f1814" stroke-width="2.5"/>
  <circle cx="280" cy="225" r="5"  fill="#fff"/>

  <!-- Front bumper -->
  <rect x="118" y="263" width="180" height="18" rx="3" fill="#3a3530" stroke="#0c0a09" stroke-width="2"/>

  <!-- Winch housing on bumper (center-front) -->
  <rect x="195" y="258" width="40" height="14" rx="2" fill="#5a5450" stroke="#0c0a09" stroke-width="1.5"/>
  <!-- Drum + cap circles -->
  <circle cx="200" cy="265" r="6" fill="#1f1814" stroke="#a8a29e" stroke-width="1.5"/>
  <circle cx="230" cy="265" r="6" fill="#1f1814" stroke="#a8a29e" stroke-width="1.5"/>
  <!-- Fairlead at the front of the winch -->
  <rect x="208" y="270" width="14" height="5" rx="1" fill="#a8a29e" stroke="#0c0a09" stroke-width="1"/>

  <!-- Two D-rings on the bumper (yellow shackles, mounted to the front face) -->
  <circle cx="150" cy="272" r="4" fill="#fbbf24" stroke="#0c0a09" stroke-width="1.2"/>
  <circle cx="263" cy="272" r="4" fill="#fbbf24" stroke="#0c0a09" stroke-width="1.2"/>

  <!-- Winch cable — sags from fairlead exit, curves over to right D-ring -->
  <path d="M 215 275 Q 240 285 263 272" fill="none" stroke="#7a6a52" stroke-width="2.2" stroke-linecap="round"/>
  <!-- J-hook clipped to the right D-ring -->
  <path d="M 263 272 L 263 281 Q 263 285 258 285" fill="none" stroke="#1f1814" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="263" cy="272" r="1.6" fill="#1f1814"/>

  <!-- Mud splatter on lower body -->
  <g fill="#4a3014" opacity="0.65">
    <circle cx="150" cy="260" r="3"/>
    <circle cx="172" cy="252" r="2"/>
    <circle cx="255" cy="262" r="3.5"/>
    <circle cx="285" cy="258" r="2.5"/>
  </g>

  <!-- ============ ROLL CAGE ============ -->
  <!-- A-pillars (front uprights) -->
  <line x1="140" y1="195" x2="148" y2="125" stroke="#0c0a09" stroke-width="6" stroke-linecap="round"/>
  <line x1="280" y1="195" x2="272" y2="125" stroke="#0c0a09" stroke-width="6" stroke-linecap="round"/>
  <!-- B-pillars (driver side mid-uprights, going back) -->
  <line x1="280" y1="195" x2="380" y2="115" stroke="#0c0a09" stroke-width="6" stroke-linecap="round"/>
  <!-- Top bar across front -->
  <line x1="148" y1="125" x2="272" y2="125" stroke="#0c0a09" stroke-width="6" stroke-linecap="round"/>
  <!-- Top bar receding to rear (driver side) -->
  <line x1="272" y1="125" x2="380" y2="115" stroke="#0c0a09" stroke-width="6" stroke-linecap="round"/>

  <!-- Light bar across top (LED spots) -->
  <rect x="155" y="115" width="115" height="12" rx="3" fill="#1f1814" stroke="#0c0a09" stroke-width="1.5"/>
  <g fill="#fef3c7">
    <circle cx="168" cy="121" r="3.5"/>
    <circle cx="190" cy="121" r="3.5"/>
    <circle cx="212" cy="121" r="3.5"/>
    <circle cx="234" cy="121" r="3.5"/>
    <circle cx="256" cy="121" r="3.5"/>
  </g>
  <!-- Light bar glow -->
  <g fill="#fbbf24" opacity="0.28">
    <circle cx="168" cy="121" r="8"/>
    <circle cx="190" cy="121" r="8"/>
    <circle cx="212" cy="121" r="8"/>
    <circle cx="234" cy="121" r="8"/>
    <circle cx="256" cy="121" r="8"/>
  </g>

  <!-- ============ WINDSHIELD (showing the cab interior) ============ -->
  <path d="M 152 130 L 270 130 L 280 195 L 142 195 Z"
        fill="#0c0a09" opacity="0.55" stroke="#1f1814" stroke-width="1.5"/>
  <!-- Windshield reflection sheen -->
  <path d="M 160 135 L 220 135 L 230 175 L 165 175 Z"
        fill="#fafaf9" opacity="0.06"/>

  <!-- ============ SMILIN' TUX (in the driver's seat, head + shoulders out the windshield) ============ -->
  <!-- Body (rounded, leaning slightly toward camera) -->
  <ellipse cx="200" cy="190" rx="36" ry="32" fill="url(#pengbody)"/>
  <!-- White belly -->
  <ellipse cx="200" cy="198" rx="24" ry="22" fill="#fafaf9"/>

  <!-- Head (slightly tilted, front-facing) -->
  <ellipse cx="200" cy="148" rx="30" ry="28" fill="url(#pengbody)"/>
  <!-- Face mask (white front area) -->
  <ellipse cx="200" cy="156" rx="22" ry="18" fill="#fafaf9"/>

  <!-- Goggles strap (cartoon black band across forehead) -->
  <rect x="171" y="138" width="58" height="8" rx="2" fill="#1f1814"/>
  <!-- Goggle lenses (yellow tinted) -->
  <ellipse cx="187" cy="142" rx="9" ry="7" fill="#fbbf24" stroke="#1f1814" stroke-width="2"/>
  <ellipse cx="213" cy="142" rx="9" ry="7" fill="#fbbf24" stroke="#1f1814" stroke-width="2"/>
  <!-- Goggle highlights -->
  <ellipse cx="185" cy="140" rx="3" ry="2" fill="#fff" opacity="0.8"/>
  <ellipse cx="211" cy="140" rx="3" ry="2" fill="#fff" opacity="0.8"/>

  <!-- Beak (orange triangle pointing down, slight smile) -->
  <path d="M 192 158 L 208 158 L 200 168 Z" fill="#d97706" stroke="#92400e" stroke-width="1.5"/>

  <!-- BIG HAPPY SMILE (curve below the beak) -->
  <path d="M 184 168 Q 200 184 216 168" fill="none" stroke="#1f1814" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="178" cy="167" rx="4" ry="2.5" fill="#d97706" opacity="0.5"/>
  <ellipse cx="222" cy="167" rx="4" ry="2.5" fill="#d97706" opacity="0.5"/>

  <!-- Flippers gripping the steering wheel -->
  <!-- Left flipper -->
  <ellipse cx="170" cy="200" rx="12" ry="18" fill="url(#pengbody)" transform="rotate(-30 170 200)"/>
  <!-- Right flipper -->
  <ellipse cx="232" cy="200" rx="12" ry="18" fill="url(#pengbody)" transform="rotate(28 232 200)"/>

  <!-- Steering wheel (in front of penguin) -->
  <circle cx="200" cy="220" r="14" fill="none" stroke="#0c0a09" stroke-width="4.5"/>
  <line x1="186" y1="220" x2="214" y2="220" stroke="#0c0a09" stroke-width="3"/>
  <line x1="200" y1="206" x2="200" y2="234" stroke="#0c0a09" stroke-width="3"/>
  <circle cx="200" cy="220" r="3" fill="#0c0a09"/>

  <!-- Cheeky orange scarf trailing back -->
  <path d="M 168 158 Q 130 168 110 180 Q 105 192 118 192 Q 145 184 175 170 Z"
        fill="#d97706" stroke="#92400e" stroke-width="1.5"/>

  <!-- ============ FRONT WHEELS (closest to camera, big chunky) ============ -->
  <!-- Driver-side front wheel -->
  <ellipse cx="290" cy="285" rx="40" ry="40" fill="#0c0a09"/>
  <circle  cx="290" cy="285" r="36" fill="url(#tire)"/>
  <g fill="#0c0a09" opacity="0.85">
    <g transform="translate(290 285)">
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(0)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(45)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(90)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(135)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(180)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(225)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(270)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(315)"/>
    </g>
  </g>
  <circle cx="290" cy="285" r="14" fill="#a8a29e"/>
  <circle cx="290" cy="285" r="9"  fill="#3a3530"/>
  <!-- Lug bolts (5) -->
  <g fill="#cbcbcb">
    <circle cx="290" cy="275" r="2"/>
    <circle cx="300" cy="282" r="2"/>
    <circle cx="296" cy="293" r="2"/>
    <circle cx="284" cy="293" r="2"/>
    <circle cx="280" cy="282" r="2"/>
  </g>

  <!-- Passenger-side front wheel -->
  <ellipse cx="130" cy="285" rx="40" ry="40" fill="#0c0a09"/>
  <circle  cx="130" cy="285" r="36" fill="url(#tire)"/>
  <g fill="#0c0a09" opacity="0.85">
    <g transform="translate(130 285)">
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(0)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(45)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(90)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(135)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(180)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(225)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(270)"/>
      <rect x="-3" y="-36" width="6" height="9" transform="rotate(315)"/>
    </g>
  </g>
  <circle cx="130" cy="285" r="14" fill="#a8a29e"/>
  <circle cx="130" cy="285" r="9"  fill="#3a3530"/>
  <!-- Lug bolts (5) -->
  <g fill="#cbcbcb">
    <circle cx="130" cy="275" r="2"/>
    <circle cx="140" cy="282" r="2"/>
    <circle cx="136" cy="293" r="2"/>
    <circle cx="124" cy="293" r="2"/>
    <circle cx="120" cy="282" r="2"/>
  </g>

  <!-- Long-arm strut hints (lifted suspension visible going up into the body) -->
  <line x1="130" y1="285" x2="135" y2="232" stroke="#3a3530" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="290" y1="285" x2="285" y2="232" stroke="#3a3530" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- Skid marks on the ground -->
  <path d="M 30 332 Q 130 326 240 332 T 450 330" fill="none" stroke="#1f1814" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 30 340 Q 130 334 240 340 T 450 338" fill="none" stroke="#1f1814" stroke-width="2.5" stroke-linecap="round"/>
</svg>
